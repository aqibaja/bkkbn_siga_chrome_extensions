<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>SIGA Smart Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <!-- Logo -->
    <img src="assets/logo.png" alt="SIGA Smart Downloader" class="logo-center"
      style="max-width:260px; margin-top:8px; margin-bottom:4px;">

    <!-- Screen 1: Pilih Kategori Laporan -->
    <div id="menu-screen" style="padding:0 24px;">
      <p class="menu-screen-hint">Pilih jenis laporan:</p>
      <div class="menu-list">
        <button class="menu-item" data-menu="laporan">
          <span class="menu-item-label">📊 LAPORAN</span>
          <span class="menu-item-chevron">›</span>
        </button>
        <button class="menu-item" data-menu="rekapitulasi">
          <span class="menu-item-label">📋 REKAPITULASI</span>
          <span class="menu-item-chevron">›</span>
        </button>
        <button class="menu-item" data-menu="verval-krs">
          <span class="menu-item-label">✅ VERVAL KRS</span>
          <span class="menu-item-chevron">›</span>
        </button>
        <button class="menu-item" data-menu="pendaftaran-elsimil">
          <span class="menu-item-label">👶 Pendaftaran ELSIMIL</span>
          <span class="menu-item-chevron">›</span>
        </button>
        <button class="menu-item" data-menu="monitoring-k0">
          <span class="menu-item-label">📡 Monitoring K0</span>
          <span class="menu-item-chevron">›</span>
        </button>
      </div>
    </div>

    <!-- Screen 2: Pilih Sub-Kategori -->
    <div id="submenu-screen" style="display:none; padding:0 24px;">
      <button class="btn-back" id="back-to-menu">← Kembali</button>
      <p class="menu-screen-title" id="submenu-title"></p>
      <div class="menu-list" id="submenu-list"></div>
    </div>

    <!-- Screen 3: Form (Tahunan / Bulanan / Download) -->
    <div id="form-screen" style="display:none;">
      <div style="padding:0 24px;">
        <button class="btn-back" id="back-to-submenu">← Kembali</button>
        <p class="menu-breadcrumb" id="breadcrumb-label"></p>
      </div>

      <!-- Monitoring K0 Panel -->
      <div id="monitoring-k0-panel" class="monitoring-panel" style="display:none;">
        <h3>📡 Monitoring SIGA</h3>
        <div class="form-group" style="margin-bottom:12px;">
          <label for="monitoring-target">Pilih target monitoring:</label>
          <select id="monitoring-target">
            <option value="#/pendaftaran">FASKES</option>
            <option value="#/kegiatan/kelompok_bkb">Kelompok BKB</option>
            <option value="#/kegiatan/kelompok_bkr">Kelompok BKR</option>
            <option value="#/kegiatan/kelompok_bkl">Kelompok BKL</option>
            <option value="#/kegiatan/kelompok_uppka">Kelompok UPPKA</option>
            <option value="#/kegiatan/kelompok_pik">Kelompok PIK-R</option>
            <option value="#/setara/kelompok_kkb">Kampung KB</option>
            <option value="#/setara/kelompok_rdkik">Rumah Dataku</option>
            <option value="#/setara/kelompok_ppks">PPKS</option>
            <option value="#/sarana/bpkkb">Sarana BP KB</option>
            <option value="#/sdm/pkb">SDM PKB</option>
            <option value="#/sdm/ppkbd">SDM PPKBD</option>
            <option value="#/sdm/subPpkbd">SDM SUBBPPKBD</option>
            <option value="#/sdm/pokKb">SDM Kelompok KB</option>
            <option value="#/tpk/kelompok_tpk">Kelompok TPK</option>
          </select>
        </div>

        <div class="grid-2-col">
          <div class="form-group">
            <label for="monitoring-initial-wait">Initial wait (detik):</label>
            <input id="monitoring-initial-wait" type="number" min="1" value="30">
          </div>
          <div class="form-group">
            <label for="monitoring-loop-wait">Loop wait (detik):</label>
            <input id="monitoring-loop-wait" type="number" min="1" value="8">
          </div>
        </div>

        <div style="display:flex; gap:8px; margin-bottom:14px;">
          <button id="start-monitoring-k0" type="button" class="btn-start-monitoring">▶ Mulai Ambil Data</button>
          <button id="reset-monitoring-k0" type="button" class="btn-reset-monitoring">🔄 Reset</button>
        </div>

        <div id="monitoring-k0-status" class="monitoring-status">Status: Menunggu</div>

        <div id="monitoring-k0-results" class="monitoring-results"></div>

        <div style="margin-top:10px; display:flex; gap:8px; align-items:center;">
          <button id="copy-bkb-result" class="btn-copy" type="button">📋 Salin ke Clipboard</button>
          <span id="copy-bkb-result-note" class="text-muted"></span>
        </div>

        <textarea id="monitoring-k0-output" readonly
          style="width:100%; height:120px; margin-top:10px; font-size:12px;"> </textarea>
      </div>

      <div class="tabs" id="tabs-bar">
        <button class="tab-button active" data-tab="tahunan">Tahunan</button>
        <button class="tab-button" data-tab="bulanan">Bulanan</button>
        <button class="tab-button" data-tab="download">Download</button>
      </div>

      <div class="form-section-wrapper">
        <!-- Tahunan Tab Content -->
        <div id="tahunan-content" class="tab-content active">
          <form id="tahunan-form" class="form-content">

            <!-- Tabel Selector -->
            <div class="form-group" id="tabel-selector-tahunan" style="display:none;">
              <label>Pilih Tabel yang akan didownload:</label>
              <div class="button-group" style="margin-bottom:6px;margin-top: 6px;">
                <button type="button" class="btn-outline" id="select-all-tabel-tahunan">Pilih Semua</button>
                <button type="button" class="btn-outline" id="reset-tabel-tahunan">Reset</button>
              </div>
              <div id="tabel-checkboxes-tahunan" class="checkbox-grid tabel-checkbox-grid"></div>
              <div id="tabel-count-tahunan" class="tabel-count">0 tabel dipilih</div>
            </div>

            <div class="form-group">
              <label for="urls-tahunan">List of URLs:</label>
              <textarea id="urls-tahunan" placeholder="Satu URL per baris" readonly></textarea>
              <div id="url-count-tahunan" class="url-count">0 URL valid</div>
            </div>
            <div class="form-group">
              <label for="periode-tahunan">Periode (Tahun):</label>
              <input type="text" id="periode-tahunan" placeholder="Contoh: 2024" value="2026">
            </div>
            <div class="form-group">
              <label>Pilih Kab/Kota (bisa lebih dari satu):</label>
              <div class="button-group">
                <button type="button" class="btn-outline" id="select-all-tahunan">Pilih Semua</button>
                <button type="button" class="btn-outline" id="reset-tahunan">Reset</button>
              </div>
              <div id="cities-tahunan" class="checkbox-grid"></div>
            </div>
            <div class="form-group" id="kecamatan-group-tahunan" style="display:none;">
              <label>Pilih Kecamatan (bisa lebih dari satu):</label>
              <!-- Hidden input for JS value compatibility -->
              <input type="text" id="kecamatan-tahunan" style="display:none;">
              <div class="button-group" style="margin-bottom:6px;margin-top:6px;">
                <button type="button" class="btn-outline" id="select-all-kecamatan-tahunan">Pilih Semua</button>
                <button type="button" class="btn-outline" id="reset-kecamatan-tahunan">Reset</button>
              </div>
              <div id="kecamatan-checkboxes-tahunan" class="checkbox-grid" style="max-height:200px;overflow-y:auto;overscroll-behavior:contain;">
              </div>
            </div>
            <div class="form-group" id="desa-selector-tahunan" style="display:none;">
              <label>Pilih Desa/Kel:</label>
              <input type="text" id="desa-search-tahunan" class="desa-search-input" placeholder="🔍 Ketik nama desa untuk filter..." style="margin-top:6px;">
              <div class="button-group" style="margin-bottom:6px;margin-top: 6px;">
                <button type="button" class="btn-outline" id="select-all-desa-tahunan">Pilih Semua</button>
                <button type="button" class="btn-outline" id="reset-desa-tahunan">Reset</button>
              </div>
              <div id="desa-checkboxes-tahunan" class="checkbox-grid tabel-checkbox-grid" style="max-height:220px;overflow-y:auto;"></div>
              <div id="desa-count-tahunan" class="tabel-count">0 dipilih</div>
            </div>
            <div class="form-group">
              <label for="rw-tahunan">RW:</label>
              <input type="text" id="rw-tahunan" placeholder="Contoh: 0100 - DUSUN SKEP">
            </div>
            <div class="form-group">
              <label for="sasaran-tahunan">Kelompok Sasaran:</label>
              <input type="text" id="sasaran-tahunan" placeholder="Contoh: Baduta">
            </div>
            <div class="form-group">
              <label for="jenis-laporan-tahunan">Jenis Laporan:</label>
              <select id="jenis-laporan-tahunan">
                <option value="" selected>Pilih jenis laporan</option>
                <option value="rekap">Rekap</option>
                <option value="detail">Detail</option>
              </select>
            </div>
            <div class="form-group" id="execution-mode-tahunan-container">
              <label for="execution-mode-tahunan">Mode Eksekusi:</label>
              <select id="execution-mode-tahunan">
                <option value="sequential" selected>Sekuensial (1 Tab Berurutan - Aman untuk banyak data)</option>
                <option value="parallel">Paralel (Banyak Tab Sekaligus - Hanya untuk sedikit data)</option>
              </select>
            </div>
            <div class="form-group">
              <div class="checkbox-inline">
                <input type="checkbox" id="enable-close-delay-tahunan">
                <label for="enable-close-delay-tahunan">Tambah waktu tunggu sebelum tutup tab</label>
              </div>
              <div id="close-delay-panel-tahunan" class="close-delay-panel">
                <label for="close-delay-tahunan">Durasi (detik):</label>
                <input type="number" id="close-delay-tahunan" min="5" max="300" value="10"
                  style="width:80px;margin-left:8px;">
                <div class="text-muted" style="margin-top:4px;">Tambah jika server lambat. Default: 10 detik.</div>
              </div>
            </div>
            <button type="submit" class="btn-primary">▶ Jalankan Download</button>
          </form>
        </div>

        <!-- Bulanan Tab Content -->
        <div id="bulanan-content" class="tab-content">
          <form id="bulanan-form" class="form-content">

            <!-- Tabel Selector -->
            <div class="form-group" id="tabel-selector-bulanan" style="display:none;">
              <label>Pilih Tabel yang akan didownload:</label>
              <div class="button-group" style="margin-bottom:6px;margin-top: 6px;">
                <button type="button" class="btn-outline" id="select-all-tabel-bulanan">Pilih Semua</button>
                <button type="button" class="btn-outline" id="reset-tabel-bulanan">Reset</button>
              </div>
              <div id="tabel-checkboxes-bulanan" class="checkbox-grid tabel-checkbox-grid"></div>
              <div id="tabel-count-bulanan" class="tabel-count">0 tabel dipilih</div>
            </div>

            <div class="form-group">
              <label for="urls-bulanan">List of URLs:</label>
              <textarea id="urls-bulanan" placeholder="Satu URL per baris" readonly></textarea>
              <div id="url-count-bulanan" class="url-count">0 URL valid</div>
            </div>
            <div class="form-group">
              <label for="periode-bulanan">Periode (Bulan):</label>
              <select id="periode-bulanan">
                <option value="" selected>Pilih bulan</option>
                <option value="Januari">Januari</option>
                <option value="Februari">Februari</option>
                <option value="Maret">Maret</option>
                <option value="April">April</option>
                <option value="Mei">Mei</option>
                <option value="Juni">Juni</option>
                <option value="Juli">Juli</option>
                <option value="Agustus">Agustus</option>
                <option value="September">September</option>
                <option value="Oktober">Oktober</option>
                <option value="November">November</option>
                <option value="Desember">Desember</option>
              </select>
            </div>
            <div class="form-group">
              <label for="tahun">Tahun:</label>
              <input type="text" id="tahun" placeholder="Contoh: 2026" value="2026">
            </div>
            <div class="form-group">
              <label>Pilih Kab/Kota (bisa lebih dari satu):</label>
              <div class="button-group">
                <button type="button" class="btn-outline" id="select-all-bulanan">Pilih Semua</button>
                <button type="button" class="btn-outline" id="reset-bulanan">Reset</button>
              </div>
              <div id="cities-bulanan" class="checkbox-grid"></div>
            </div>
            <div class="form-group" id="kecamatan-group-bulanan" style="display:none;">
              <label>Pilih Kecamatan (bisa lebih dari satu):</label>
              <!-- Hidden input for JS value compatibility -->
              <input type="text" id="kecamatan-bulanan" style="display:none;">
              <div class="button-group" style="margin-bottom:6px;margin-top:6px;">
                <button type="button" class="btn-outline" id="select-all-kecamatan-bulanan">Pilih Semua</button>
                <button type="button" class="btn-outline" id="reset-kecamatan-bulanan">Reset</button>
              </div>
              <div id="kecamatan-checkboxes-bulanan" class="checkbox-grid" style="max-height:200px;overflow-y:auto;overscroll-behavior:contain;">
              </div>
            </div>
            <div class="form-group" id="desa-selector-bulanan" style="display:none;">
              <label>Pilih Desa/Faskes:</label>
              <input type="text" id="desa-search-bulanan" class="desa-search-input" placeholder="🔍 Ketik nama desa/faskes untuk filter..." style="margin-top:6px;">
              <div class="button-group" style="margin-bottom:6px;margin-top: 6px;">
                <button type="button" class="btn-outline" id="select-all-desa-bulanan">Pilih Semua</button>
                <button type="button" class="btn-outline" id="reset-desa-bulanan">Reset</button>
              </div>
              <div id="desa-checkboxes-bulanan" class="checkbox-grid tabel-checkbox-grid" style="max-height:220px;overflow-y:auto;"></div>
              <div id="faskes-count-bulanan" class="tabel-count">0 dipilih</div>
            </div>
            <div class="form-group">
              <label for="jenis-laporan-bulanan">Jenis Laporan:</label>
              <select id="jenis-laporan-bulanan">
                <option value="" selected>Pilih jenis laporan</option>
                <option value="rekap">Rekap</option>
                <option value="detail">Detail</option>
              </select>
            </div>
            <div class="form-group" id="execution-mode-bulanan-container">
              <label for="execution-mode-bulanan">Mode Eksekusi:</label>
              <select id="execution-mode-bulanan">
                <option value="sequential" selected>Sekuensial (1 Tab Berurutan - Aman untuk banyak data)</option>
                <option value="parallel">Paralel (Banyak Tab Sekaligus - Hanya untuk sedikit data)</option>
              </select>
            </div>
            <div class="form-group">
              <div class="checkbox-inline">
                <input type="checkbox" id="enable-close-delay-bulanan">
                <label for="enable-close-delay-bulanan">Tambah waktu tunggu sebelum tutup tab</label>
              </div>
              <div id="close-delay-panel-bulanan" class="close-delay-panel">
                <label for="close-delay-bulanan">Durasi (detik):</label>
                <input type="number" id="close-delay-bulanan" min="5" max="300" value="10"
                  style="width:80px;margin-left:8px;">
                <div class="text-muted" style="margin-top:4px;">Tambah jika server lambat. Default: 10 detik.</div>
              </div>
            </div>
            <button type="submit" class="btn-primary">▶ Jalankan Download</button>
          </form>
        </div>

        <!-- Tab Download Progress -->
        <div id="download-content" class="tab-content">
          <h2 class="section-title">📥 Download Progress</h2>
          <div class="download-action-bar">
            <button id="retry-all-btn" type="button" class="btn-retry-all">♻️ Retry Semua Gagal & Progress</button>
            <button id="clear-done-btn" type="button" class="btn-clear-done">🗑️ Bersihkan yang Selesai</button>
          </div>
          <div id="download-progress-list"></div>
        </div>
      </div><!-- /.form-section-wrapper -->
    </div><!-- /#form-screen -->

    <!-- Footer -->
    <div class="footer-info">SIGA Smart Downloader v1.0 — BKKBN Aceh</div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
